name: CI - Build & Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Jupyter
        run: pip install jupyter nbconvert

      - name: Validate Supabase Config (if available)
        run: |
          python << 'EOF'
          import os
          import sys
          import re
          
          db_url = os.getenv('SUPABASE_DB_URL', '')
          
          if db_url:
              print("[CHECK] SUPABASE_DB_URL is set")
              
              # Validate format
              if not db_url.startswith('postgresql'):
                  print("[ERROR] Invalid format: must start with 'postgresql'")
                  sys.exit(1)
              
              # Validate port
              if ':6543' not in db_url and ':5432' in db_url:
                  print("[ERROR] Wrong port: use 6543 (pooler), not 5432")
                  sys.exit(1)
              
              if ':6543' not in db_url and ':5432' not in db_url:
                  print("[WARN] Port not found in connection string - assuming pooler")
              
              # Validate host
              if 'pooler.supabase.com' in db_url:
                  print("[OK] Using Supabase connection pooler (6543)")
              elif 'supabase.co' in db_url:
                  print("[WARN] Using direct connection - consider pooler for better stability")
              
              print("[OK] Supabase config looks good")
          else:
              print("[INFO] SUPABASE_DB_URL not set - will use SQLite for CI tests")
              print("[OK] Config validation skipped")
          EOF

      - name: Run integration tests
        run: |
          python << 'EOF'
          import sys
          import os
          
          print("[START] Running integration tests...")
          
          try:
              # Test 1: Import modules
              print("\n[TEST 1] Importing modules...")
              from ingestion.ingestion_pipeline import extract_from_idx, transform, IngestionLog
              from feature_engineering.config import DB_URL, ALL_FEATURES
              from feature_engineering.feature_engineering import load_raw_data, build_features, StockFeatures
              print("[OK] Modules imported successfully")
              print(f"[OK] Feature engineering configured with {len(ALL_FEATURES)} features")
              
              # Test 2: Extract (with retry)
              print("\n[TEST 2] Testing extract_from_idx()...")
              try:
                  records, method = extract_from_idx()
                  print(f"[OK] Extract successful: {len(records)} records via {method}")
              except Exception as e:
                  print(f"[WARN] Extract failed (expected in some environments): {e}")
              
              # Test 3: Transform (mock data)
              print("\n[TEST 3] Testing transform()...")
              mock_records = [
                  {
                      "IDStockSummary": 1,
                      "Date": "2026-06-19",
                      "StockCode": "BBCA",
                      "StockName": "PT Bank Central Asia",
                      "Close": 9000.0,
                      "Volume": 1000000.0,
                  }
              ]
              df = transform(mock_records)
              assert len(df) == 1, "Transform should produce 1 row"
              assert df.columns.tolist().count("stock_code") == 1, "Should have stock_code column"
              print(f"[OK] Transform: {len(df)} rows × {len(df.columns)} columns")
              
              # Test 4: Feature engineering (mock data)
              print("\n[TEST 4] Testing feature engineering...")
              mock_raw = pd.DataFrame([
                  {
                      "date": "2026-06-26",
                      "stock_code": "BBCA",
                      "stock_name": "PT Bank Central Asia",
                      "previous": 9000.0,
                      "open_price": 9050.0,
                      "high": 9100.0,
                      "low": 8950.0,
                      "close": 9080.0,
                      "volume": 1000000.0,
                      "value": 9080000000.0,
                      "frequency": 5000.0,
                      "bid": 9075.0,
                      "offer": 9085.0,
                      "bid_volume": 1000.0,
                      "offer_volume": 1000.0,
                      "foreign_buy": 500000.0,
                      "foreign_sell": 300000.0,
                      "tradeble_shares": 1000000000.0,
                  },
                  {
                      "date": "2026-06-25",
                      "stock_code": "BBCA",
                      "stock_name": "PT Bank Central Asia",
                      "previous": 8900.0,
                      "open_price": 8950.0,
                      "high": 9000.0,
                      "low": 8900.0,
                      "close": 9000.0,
                      "volume": 900000.0,
                      "value": 8100000000.0,
                      "frequency": 4500.0,
                      "bid": 8995.0,
                      "offer": 9005.0,
                      "bid_volume": 900.0,
                      "offer_volume": 900.0,
                      "foreign_buy": 400000.0,
                      "foreign_sell": 200000.0,
                      "tradeble_shares": 1000000000.0,
                  }
              ])
              df_features = build_features(mock_raw)
              assert "daily_return_pct" in df_features.columns, "Missing daily_return_pct feature"
              assert "foreign_net" in df_features.columns, "Missing foreign_net feature"
              assert len(df_features) == 2, "Feature engineering should produce 2 rows"
              print(f"[OK] Feature engineering: {len(df_features)} rows × {len(df_features.columns)} columns")
              
              # Test 5: Database schema
              print("\n[TEST 4] Checking database schema...")
              from sqlalchemy import create_engine, inspect
              
              db_url = os.getenv("SUPABASE_DB_URL", "sqlite:///ingestion/test.db")
              engine = create_engine(db_url, echo=False)
              inspector = inspect(engine)
              tables = inspector.get_table_names()
              
              expected_tables = ["stock_summary", "ingestion_log", "stock_features"]
               for table in expected_tables:
                  if table in tables or db_url.startswith("sqlite"):
                      print(f"[OK] Table '{table}' exists or will be created")
                  else:
                      print(f"[WARN] Table '{table}' not found (will auto-create)")
              
              print("\n[SUCCESS] All integration tests passed!")
              
          except Exception as e:
              print(f"\n[ERROR] Test failed: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Run notebook (SQLite mode — test only)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=300 ingestion/ingestion.ipynb

      - name: Test passed
        run: echo "CI PASSED - All tests completed successfully ✓"
