name: CI - Build & Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Jupyter
        run: pip install jupyter nbconvert

      - name: Run notebook (SQLite mode — test only)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: jupyter nbconvert --to notebook --execute --inplace ingestion/ingestion.ipynb

      - name: Test passed
        run: echo "CI PASSED - Notebook berjalan tanpa error"
