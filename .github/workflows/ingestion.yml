name: IDX Daily Ingestion

on:
  schedule:
    # Senin - Jumat, 17:30 WIB (10:30 UTC)
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline (Jupyter Notebook)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          pip install jupyter nbconvert
          jupyter nbconvert --to notebook --execute --inplace ingestion/ingestion.ipynb
